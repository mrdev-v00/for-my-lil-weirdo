<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Lil Weirdo 💗</title>

<!-- Cute Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #ffd6e7, #ffe6f0);
  overflow-y: auto;
}

/* Center everything */
.container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  width: 90%;
  max-width: 700px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* Title */
h2 {
  font-family: 'Pacifico', cursive;
  color: #ff4da6;
  font-size: 28px;
}

/* Text */
p {
  font-size: 17px;
  line-height: 1.7;
  color: #333;
  background: rgba(255,255,255,0.5);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* Buttons */
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  background: #ff99cc;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px #ff99cc;
}

button:hover {
  background: #ff66aa;
}

/* Gallery */
.gallery img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  margin: 10px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover,
.gallery img.active {
  transform: scale(1.5);
  z-index: 999;
  position: relative;
  box-shadow: 0 0 25px #ff66aa;
}

/* Music Button */
.music-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #ff66aa;
  padding: 10px 15px;
  border-radius: 20px;
  color: white;
  font-size: 14px;
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<audio id="music" loop>
  <source src="humdum.mp3" type="audio/mp3">
</audio>

<div class="container" id="content"></div>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<script>

// music
let music = document.getElementById("music");
music.volume = 0;

function playMusic(){
  music.play().catch(()=>{});
  let v=0;
  let fade=setInterval(()=>{
    if(v<0.5){ v+=0.01; music.volume=v; }
    else clearInterval(fade);
  },200);
}

function toggleMusic(){
  if(music.paused) music.play();
  else music.pause();
}

// hearts
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💗";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(15+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},500);

// typing
function typeText(text, cb){
  let i=0;
  content.innerHTML="<p id='t'></p>";
  let p=document.getElementById("t");

  function type(){
    if(i<text.length){
      p.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,15);
    } else if(cb) cb();
  }
  type();
}

function nextBtn(fn){
  let b=document.createElement("button");
  b.innerText="Next ➜";
  b.onclick=fn;
  content.appendChild(b);
}

// intro
function intro(){
  content.innerHTML=`
  <h2>Hey lil weirdo 💗</h2>


  <p>its your birthday and im forgetting to wish you on it. Good luck 🤣🤣</p>

  <button onclick="start()">Continue</button>
  `;
}

// start
function start(){
  playMusic();
  ready();
}

// ready
function ready(){
  content.innerHTML=`
  <h2>Are you ready?</h2>
  <button onclick="scene1()">Yes</button>
  <button onclick="scene1()">Still Yes</button>
  <p>DONT FORGET THAT I WILL ANNOY YOU FOR THE REST OF YOUR LIFE 😌</p>
  `;
}

// scenes same as before (kept untouched for your paragraphs)

function scene1(){ typeText(`So it was just a random day, you were here in Karachi arguing with other family members over which car is better and I was busy using the laptop in a corner and your voice...ill say that was a little too annoying 🤣

I DIDINT KNEW THAT THERES A WEIRDO JST LIKE ME IN MY FAMILY.`,()=>nextBtn(scene2)); }

function scene3(){ typeText(`I dont even remember properly, but i know it was my mistake. you asked me that we wont talk much on chat and I was not letting go without knowing the reason, we both started arguing over it and to stop the argument you blocked me.

🤣 Peak Us fight`,()=>nextBtn(scene4)); }
function scene4(){ typeText(`I can't list every single thing you have done so far till now, you know how clumsy you are and I am aware of that very well too.

function scene5(){ typeText(`it was the time when we fought, i needed your help and asked for it. you came online and asked me for what it was and I told you everything abt that person, and the amount of confessions i was getting so you helped me with it and I made a group of that one person, you and me.

function finalScene(){
  typeText(`Out of all these moments... I didn’t realize when you became this important to me.`,()=>nextBtn(finalMsg));
}

function finalMsg(){
  content.innerHTML=`
  <h2>Happy Birthday 💗</h2>
  <p>
  I am grateful to have you on my side,💞<br><br>
  I remember every single detail of everything...🫶❤️‍🔥 <br><br>
  Thank you my cute lil sister 🫠🫠 <br><br>
  ik im annoying but that wont change anything, HEHEHHEE <br> <br>
  You are the best!! 🥰
  </p>`;
}

intro();

</script>

</body>
</html>
